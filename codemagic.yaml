workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bereifung24_env
    scripts:
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Set up signing, Build IPA and Upload
        script: |
          set -e

          # ===== 1. CODE SIGNING =====
          # Generate a fresh RSA private key and set as env var
          openssl genrsa 2048 > /tmp/cert_private_key.pem 2>/dev/null
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_private_key.pem)

          echo "=== Fetching/creating signing files ==="
          app-store-connect fetch-signing-files "de.bereifung24.bereifung24App" \
            --type IOS_APP_STORE \
            --create

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning

          # Use Codemagic's generated export_options.plist directly (do NOT overwrite it)
          echo "=== Codemagic export_options.plist ==="
          cat /Users/builder/export_options.plist

          # ===== 2. BUILD IPA =====
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          BUILD_NUMBER=$((LATEST_BUILD + 1))
          # Skip all previously burned build numbers from failed uploads
          if [ "$BUILD_NUMBER" -lt 11 ]; then
            BUILD_NUMBER=11
          fi
          echo "=== Latest TestFlight build: $LATEST_BUILD, New build number: $BUILD_NUMBER ==="

          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist || true

          # Check if IPA was created
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)

          # Fallback: manual export from xcarchive
          if [ -z "$IPA_PATH" ]; then
            echo "=== Flutter did not create IPA, exporting manually ==="
            ARCHIVE_PATH=$(find build/ios/archive -name "*.xcarchive" -type d 2>/dev/null | head -1)
            if [ -n "$ARCHIVE_PATH" ]; then
              mkdir -p build/ios/ipa
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportOptionsPlist /Users/builder/export_options.plist \
                -exportPath build/ios/ipa
              IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "=== FATAL: No IPA created ==="
            exit 1
          fi

          echo "=== IPA created: $IPA_PATH ==="

          # Upload is handled by Codemagic's publishing section below
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: de.bereifung24.bereifung24App
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA (Ad Hoc)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
