workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.bereifung24.bereifung24App
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bereifung24_env
    scripts:
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Verify signing setup
        script: |
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles"
          echo "=== Codemagic export_options.plist ==="
          cat /Users/builder/export_options.plist || echo "Not found"
      - name: Build IPA
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1))
          echo "=== Build number: $BUILD_NUMBER ==="
          
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -n "$IPA_PATH" ]; then
            echo "=== Uploading $IPA_PATH to TestFlight ==="
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "ERROR: No IPA found!"
            exit 1
          fi
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: de.bereifung24.bereifung24App
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA (Ad Hoc)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
