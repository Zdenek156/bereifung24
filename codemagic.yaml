workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bereifung24_env
    scripts:
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Set up code signing
        script: |
          echo "=== Fetching signing files ==="
          app-store-connect fetch-signing-files "de.bereifung24.bereifung24App" \
            --type IOS_APP_STORE \
            --create
          echo "=== Initializing keychain ==="
          keychain initialize
          echo "=== Adding certificates ==="
          keychain add-certificates
          echo "=== Applying profiles to Xcode project ==="
          xcode-project use-profiles
          
          echo "=== Fixing export_options.plist certificate name ==="
          # Codemagic generates "iOS Distribution" but the cert is "Apple Distribution"
          if [ -f /Users/builder/export_options.plist ]; then
            sed -i '' 's/iOS Distribution/Apple Distribution/g' /Users/builder/export_options.plist
            echo "=== Fixed export_options.plist ==="
            cat /Users/builder/export_options.plist
          fi
          
          echo "=== Verifying pbxproj signing settings ==="
          grep -A2 "CODE_SIGN_STYLE\|PROVISIONING_PROFILE\|DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj || true
      - name: Verify code signing
        script: |
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          echo "=== Export options plist ==="
          cat /Users/builder/export_options.plist || echo "Export options plist not found"
          echo "=== Checking pbxproj for PROVISIONING_PROFILE_SPECIFIER ==="
          grep "PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj || echo "WARNING: No PROVISIONING_PROFILE_SPECIFIER found in pbxproj!"
      - name: Build IPA
        script: |
          # Show what certificate is actually installed
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning
          
          echo "=== Export options plist (after fix) ==="
          cat /Users/builder/export_options.plist
          
          # Build number
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1))
          echo "=== Build number: $BUILD_NUMBER ==="

          # Build IPA using Codemagic's (fixed) export_options.plist
          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

          # Verify IPA was created
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -n "$IPA_PATH" ]; then
            echo "=== IPA created: $IPA_PATH ==="
          else
            echo "=== ERROR: No IPA created! ==="
            find /Users/builder -name "*.xcarchive" -type d 2>/dev/null
            exit 1
          fi
      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find /Users/builder -name "*.ipa" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$IPA_PATH" ]; then
            echo "=== Uploading $IPA_PATH to TestFlight ==="
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "ERROR: No IPA found!"
            exit 1
          fi
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: de.bereifung24.bereifung24App
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA (Ad Hoc)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
