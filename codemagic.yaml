workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - bereifung24_env
    scripts:
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Set up signing, Build IPA and Upload
        script: |
          set -e

          # ===== 1. CODE SIGNING =====
          openssl genrsa 2048 > /tmp/cert_private_key.pem 2>/dev/null

          echo "=== Fetching/creating signing files ==="
          app-store-connect fetch-signing-files "de.bereifung24.bereifung24App" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=/tmp/cert_private_key.pem

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning

          # ===== 2. FIX EXPORT OPTIONS =====
          # Get cert and profile names
          CERT_NAME=$(security find-identity -v -p codesigning | grep "Apple Distribution\|iPhone Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          PROFILE_FILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_NAME=""
          if [ -n "$PROFILE_FILE" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | plutil -extract Name raw - 2>/dev/null || echo "")
          fi
          echo "=== Cert: $CERT_NAME, Profile: $PROFILE_NAME ==="

          # Create export options plist using plutil (avoids YAML/XML conflicts)
          plutil -create xml1 /Users/builder/export_options.plist
          plutil -insert method -string "app-store" /Users/builder/export_options.plist
          plutil -insert teamID -string "Q5GN6QWF45" /Users/builder/export_options.plist
          plutil -insert uploadBitcode -bool false /Users/builder/export_options.plist
          plutil -insert uploadSymbols -bool true /Users/builder/export_options.plist
          plutil -insert signingStyle -string "manual" /Users/builder/export_options.plist
          plutil -insert signingCertificate -string "${CERT_NAME:-Apple Distribution}" /Users/builder/export_options.plist
          plutil -insert provisioningProfiles -dictionary /Users/builder/export_options.plist
          plutil -insert provisioningProfiles.de\\.bereifung24\\.bereifung24App -string "${PROFILE_NAME}" /Users/builder/export_options.plist

          echo "=== Final export_options.plist ==="
          cat /Users/builder/export_options.plist

          # ===== 3. BUILD IPA =====
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1))
          echo "=== Build number: $BUILD_NUMBER ==="

          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist || true

          # Check if IPA was created
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)

          # Fallback: manual export from xcarchive
          if [ -z "$IPA_PATH" ]; then
            echo "=== Flutter did not create IPA, exporting manually ==="
            ARCHIVE_PATH=$(find build/ios/archive -name "*.xcarchive" -type d 2>/dev/null | head -1)
            if [ -n "$ARCHIVE_PATH" ]; then
              mkdir -p build/ios/ipa
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportOptionsPlist /Users/builder/export_options.plist \
                -exportPath build/ios/ipa
              IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "=== FATAL: No IPA created ==="
            exit 1
          fi

          echo "=== IPA created: $IPA_PATH ==="

          # ===== 4. UPLOAD =====
          echo "=== Uploading to TestFlight ==="
          app-store-connect publish --path "$IPA_PATH"
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-debug:
    name: iOS Debug (Ad Hoc)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: bereifung24_app
    integrations:
      app_store_connect: Bereifung24_ASC_Key
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: de.bereifung24.bereifung24App
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter packages
        script: |
          flutter packages pub get
      - name: Build IPA (Ad Hoc)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - bereifung24_app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - zdenek156@gmail.com
        notify:
          success: true
          failure: true
